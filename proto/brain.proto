syntax = "proto3";

package brain;

option go_package = "./proto";

service BrainService {
  rpc ProcessDocument (DocumentRequest) returns (DocumentResponse);
  rpc Chat (ChatRequest) returns (ChatResponse);
  rpc ProcessNote (NoteRequest) returns (DocumentResponse);
}

message DocumentRequest {
  string file_name = 1; 
  string author = 2;
  bytes content = 3;
}

message NoteRequest {
  string title = 1;
  string author = 2;
  string content = 3;
}

message DocumentResponse {
  bool success = 1;
  string message = 2;
  string document_id = 3;
}

message ChatResponse {
  string answer = 1;
}

message ChatMessage {
  string role = 1;
  string content = 2;
}

message ChatRequest {
  string query = 1;
  repeated ChatMessage history = 2;
}